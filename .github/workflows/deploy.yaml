name: Deploy PROD (Approved Only)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      PROD_ENDPOINT_NAME: iris-endpoint-prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS Auth via Access Keys
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Terraform to fetch outputs (apply optional)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply (optional safety)
        working-directory: terraform
        run: terraform apply -auto-approve -var-file=terrafrm.tfvars

      - name: Export Terraform outputs
        working-directory: terraform
        run: |
          echo "SAGEMAKER_EXEC_ROLE_ARN=$(terraform output -raw sagemaker_execution_role_arn)" >> $GITHUB_ENV
          echo "MODEL_GROUP=$(terraform output -raw model_package_group_name)" >> $GITHUB_ENV

      # Python deps
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "sagemaker>=2.218.0,<3" "boto3>=1.28.0" "botocore>=1.31.0"

      # Deploy only Approved
      - name: Deploy PROD endpoint (Approved only)
        run: |
          python pipelines/deploy.py \
            --region "${AWS_REGION}" \
            --execution-role-arn "${SAGEMAKER_EXEC_ROLE_ARN}" \
            --model-package-group-name "${MODEL_GROUP}" \
            --endpoint-name "${PROD_ENDPOINT_NAME}" \
            --instance-type "ml.m5.large" \
            --approval-status "Approved"